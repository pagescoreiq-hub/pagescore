<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PageScoreIQ — Create account</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px; color: #1a202c;
    }
    .login-card {
      background: white; border-radius: 16px; padding: 36px 32px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25); width: 100%; max-width: 380px;
    }
    .brand { text-align: center; margin-bottom: 26px; }
    .brand .logo { font-size: 40px; }
    .brand h1 { font-size: 22px; font-weight: 800; margin-top: 6px; letter-spacing: -0.3px; }
    .brand p { font-size: 12px; color: #718096; margin-top: 4px; }
    label { display: block; font-size: 11px; font-weight: 700; color: #718096; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
    input {
      width: 100%; border: 1.5px solid #e2e8f0; border-radius: 9px;
      padding: 12px 14px; font-size: 14px; outline: none; color: #2d3748; margin-bottom: 16px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus { border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,0.15); }
    .btn {
      width: 100%; padding: 13px; background: linear-gradient(135deg, #3182ce, #2b6cb0);
      color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-box {
      background: #fff5f5; border: 1px solid #fed7d7; border-radius: 8px;
      padding: 11px 14px; color: #c53030; font-size: 13px; margin-bottom: 14px; display: none;
    }
    .error-box.show { display: block; }
    .hint { font-size: 11px; color: #a0aec0; margin-top: -10px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <form class="login-card" id="register-form" onsubmit="return doRegister(event)">
    <div class="brand">
      <div class="logo">🛡️</div>
      <h1>Create your account</h1>
      <p>Start running landing page audits</p>
    </div>

    <div class="error-box" id="err"></div>

    <label for="username">Username</label>
    <input type="text" id="username" placeholder="yourname" autocomplete="username" required />
    <div class="hint">3–30 characters: letters, numbers, . _ -</div>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required />
    <div class="hint">At least 8 characters</div>

    <button class="btn" id="btn" type="submit">Create account</button>
    <p style="text-align:center; font-size:13px; color:#718096; margin-top:16px;">
      Already have an account? <a href="/login" style="color:#3182ce; font-weight:600;">Sign in</a>
    </p>
  </form>

  <script src="/auth.js"></script>
  <script>
    if (PSIQAuth.getAccess()) window.location.href = '/';

    async function doRegister(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const err = document.getElementById('err');
      const btn = document.getElementById('btn');
      err.className = 'error-box';
      btn.disabled = true; btn.textContent = 'Creating…';

      try {
        const resp = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password }),
        });
        const json = await resp.json();
        if (!resp.ok || !json.success) throw new Error(json.error || 'Could not create account');
        PSIQAuth.saveAuth(json);   // auto-login with the returned tokens
        window.location.href = '/';
      } catch (ex) {
        err.textContent = ex.message;
        err.className = 'error-box show';
        btn.disabled = false; btn.textContent = 'Create account';
      }
      return false;
    }
  </script>
</body>
</html>
